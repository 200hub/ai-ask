name: Version Check and Auto Release

# 监听 tauri.conf.json 的版本变更，自动同步版本号并创建 tag 触发 release
#
# 工作流程：
#   1. 监听 main 分支的 push 事件
#   2. 检查 src-tauri/tauri.conf.json 的版本是否已有对应 tag
#   3. 如果没有对应 tag，自动同步版本号到其他文件
#   4. 创建新的版本 tag
#   5. 触发 release 工作流
#
# 版本号管理：
#   - 单一真实来源：src-tauri/tauri.conf.json
#   - 自动同步目标：package.json, Cargo.toml, constants.ts
#   - Tag 格式：v{version} (例如：v1.0.0)
#
# 注意事项：
#   - 只在 main 分支触发
#   - 需要配置 PAT_TOKEN secret 以触发后续工作流（可选，无 PAT 时使用 GITHUB_TOKEN）
#   - 版本号必须符合 semver 规范
#
# Secret 配置（推荐）：
#   PAT_TOKEN: Personal Access Token，需要 repo 和 workflow 权限
#   - 如果配置了 PAT_TOKEN，tag 推送会触发 release.yml
#   - 如果未配置，将使用 GITHUB_TOKEN（但不会触发后续工作流，需手动触发）

on:
  push:
    branches:
      - main

permissions:
  contents: write  # 需要写权限来创建 tag 和提交变更

jobs:
  check-version:
    name: Check Version and Create Tag
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 需要完整历史和 tag 来做版本发布判断
          fetch-tags: true
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}  # 使用 PAT 以触发后续工作流
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      # 检查当前版本是否已有对应 tag
      - name: Check if version changed
        id: version-check
        run: |
          # 获取当前版本（单一真实来源）
          CURRENT_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Current version: $CURRENT_VERSION"

          # 与 tag 比对：存在 v{version} 或 {version} 视为已发布
          VERSION_TAG="v${CURRENT_VERSION}"
          echo "Checking tags: ${VERSION_TAG} (fallback: ${CURRENT_VERSION})"

          if git rev-parse "${VERSION_TAG}" >/dev/null 2>&1 || git rev-parse "${CURRENT_VERSION}" >/dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version already released by tag, skip sync/tag creation"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "No release tag found for $CURRENT_VERSION, continue release flow"
          fi
      
      # 安装依赖（仅在版本变更时）
      - name: Install dependencies
        if: steps.version-check.outputs.changed == 'true'
        run: |
          # 检查 lockfile 是否存在
          if [ -f "pnpm-lock.yaml" ]; then
            echo "Installing with frozen lockfile..."
            pnpm install --frozen-lockfile
          else
            echo "No lockfile found, installing without freeze..."
            pnpm install --no-frozen-lockfile
          fi
      
      # 同步版本号到其他文件
      - name: Sync version to other files
        if: steps.version-check.outputs.changed == 'true'
        run: |
          echo "Synchronizing version ${{ steps.version-check.outputs.version }} to all files..."
          pnpm run version:sync
      
      # 配置 Git
      - name: Configure Git
        if: steps.version-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      # 提交版本同步的变更
      - name: Commit version sync changes
        if: steps.version-check.outputs.changed == 'true'
        run: |
          git add package.json src-tauri/Cargo.toml src-tauri/Cargo.lock src/lib/utils/constants.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync version to ${{ steps.version-check.outputs.version }}"
            git push origin main
          fi
      
      # 检查 tag 是否已存在
      - name: Check if tag exists
        if: steps.version-check.outputs.changed == 'true'
        id: tag-check
        run: |
          TAG_NAME="v${{ steps.version-check.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist"
          fi
      
      # 创建新的 tag
      - name: Create version tag
        if: steps.version-check.outputs.changed == 'true' && steps.tag-check.outputs.exists == 'false'
        run: |
          TAG_NAME="v${{ steps.version-check.outputs.version }}"
          echo "Creating tag $TAG_NAME"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Tag $TAG_NAME created and pushed"
      
      # 输出结果
      - name: Summary
        if: steps.version-check.outputs.changed == 'true'
        run: |
          echo "✅ Version updated to ${{ steps.version-check.outputs.version }}"
          echo "✅ All files synchronized"
          echo "✅ Tag v${{ steps.version-check.outputs.version }} created"
          echo "🚀 Release workflow will be triggered automatically"
